<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- 羊皮纸渐变背景 -->
    <linearGradient id="parchmentBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D4B8"/>
      <stop offset="30%" style="stop-color:#D4B896"/>
      <stop offset="70%" style="stop-color:#C9A876"/>
      <stop offset="100%" style="stop-color:#B8945A"/>
    </linearGradient>

    <!-- 书籍皮革封面渐变 -->
    <linearGradient id="leatherCover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C3D2E"/>
      <stop offset="50%" style="stop-color:#4A2C1A"/>
      <stop offset="100%" style="stop-color:#3D2315"/>
    </linearGradient>

    <!-- 金色装饰渐变 -->
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#C9A227"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>

    <!-- 纸张纹理 -->
    <filter id="paperTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#F5E6D3" surfaceScale="2">
        <feDistantLight azimuth="45" elevation="60"/>
      </feDiffuseLighting>
    </filter>

    <!-- 阴影效果 -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="8" flood-color="#2A1A0A" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect width="256" height="256" rx="40" fill="url(#parchmentBg)"/>

  <!-- 纹理叠加层 -->
  <rect width="256" height="256" rx="40" fill="url(#paperTexture)" opacity="0.15"/>

  <!-- 古书主体 -->
  <g filter="url(#dropShadow)">
    <!-- 书籍封面（左侧） -->
    <path d="M60 45 L60 195 Q60 205 70 205 L125 205 L125 45 Q125 35 115 35 L70 35 Q60 35 60 45"
          fill="url(#leatherCover)" stroke="#2A1A0A" stroke-width="2"/>

    <!-- 书籍封面（右侧，稍微翻开） -->
    <path d="M125 45 L125 205 L180 200 Q190 198 190 188 L190 52 Q190 42 180 42 L135 42 Q125 42 125 45"
          fill="url(#leatherCover)" stroke="#2A1A0A" stroke-width="2"/>

    <!-- 书脊 -->
    <rect x="120" y="35" width="10" height="175" fill="#3D2315"/>

    <!-- 书页边缘 -->
    <g fill="#F5E6D3" stroke="#D4C4A8" stroke-width="0.5">
      <path d="M125 48 L188 48 L188 52 L125 52"/>
      <path d="M125 55 L188 55 L188 58 L125 58"/>
      <path d="M125 62 L188 62 L188 65 L125 65"/>
      <path d="M125 190 L188 188 L188 192 L125 194"/>
      <path d="M125 197 L188 195 L188 199 L125 201"/>
    </g>

    <!-- 左侧封面装饰 - 中世纪花纹边框 -->
    <rect x="65" y="40" width="50" height="160" fill="none" stroke="url(#goldAccent)" stroke-width="2" rx="3"/>
    <rect x="70" y="45" width="40" height="150" fill="none" stroke="url(#goldAccent)" stroke-width="1" rx="2"/>

    <!-- 左侧封面中央装饰 - 魔法符号 -->
    <circle cx="90" cy="100" r="20" fill="none" stroke="url(#goldAccent)" stroke-width="2"/>
    <circle cx="90" cy="100" r="12" fill="none" stroke="url(#goldAccent)" stroke-width="1.5"/>
    <path d="M90 80 L90 120 M80 100 L100 100 M82 92 L98 108 M98 92 L82 108"
          stroke="url(#goldAccent)" stroke-width="1.5" fill="none"/>

    <!-- 左侧封面底部装饰 -->
    <path d="M70 180 Q90 175 110 180" fill="none" stroke="url(#goldAccent)" stroke-width="1.5"/>
    <circle cx="70" cy="180" r="3" fill="url(#goldAccent)"/>
    <circle cx="110" cy="180" r="3" fill="url(#goldAccent)"/>

    <!-- 右侧翻开的书页 - 羊皮纸内容 -->
    <rect x="130" y="50" width="55" height="140" fill="#F8F0E0" stroke="#D4C4A8" stroke-width="1"/>

    <!-- 书页上的文字线条 -->
    <g stroke="#8B7355" stroke-width="1" opacity="0.6">
      <line x1="135" y1="60" x2="180" y2="60"/>
      <line x1="135" y1="70" x2="180" y2="70"/>
      <line x1="135" y1="80" x2="175" y2="80"/>
      <line x1="135" y1="90" x2="180" y2="90"/>
      <line x1="135" y1="100" x2="170" y2="100"/>
      <line x1="135" y1="110" x2="180" y2="110"/>
      <line x1="135" y1="120" x2="178" y2="120"/>
      <line x1="135" y1="130" x2="180" y2="130"/>
      <line x1="135" y1="140" x2="172" y2="140"/>
      <line x1="135" y1="150" x2="180" y2="150"/>
      <line x1="135" y1="160" x2="176" y2="160"/>
      <line x1="135" y1="170" x2="180" y2="170"/>
    </g>

    <!-- 书页标题装饰 -->
    <text x="157" y="58" font-family="serif" font-size="8" fill="#5C3D2E" text-anchor="middle" font-style="italic">ℳ</text>

    <!-- 书页角落装饰 -->
    <path d="M130 50 L135 50 L135 55" fill="#D4AF37" opacity="0.8"/>
    <path d="M185 50 L185 55 L180 55" fill="#D4AF37" opacity="0.8"/>
    <path d="M130 190 L135 190 L135 185" fill="#D4AF37" opacity="0.8"/>
    <path d="M185 190 L185 185 L180 185" fill="#D4AF37" opacity="0.8"/>
  </g>

  <!-- 魔法光晕效果 -->
  <circle cx="90" cy="100" r="25" fill="none" stroke="url(#goldAccent)" stroke-width="0.5" opacity="0.5">
    <animate attributeName="r" values="25;28;25" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.3;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- 装饰性 rune 符号 -->
  <text x="90" y="165" font-family="serif" font-size="10" fill="url(#goldAccent)" text-anchor="middle">ᛟ</text>
</svg>