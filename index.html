<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:;">
    <title>Parchment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-primary: #FAF7F2;
            --bg-secondary: #F5F0E8;
            --bg-paper: #FFFEFA;
            --text-primary: #2C2416;
            --text-secondary: #5A4D3A;
            --text-muted: #8B7D66;
            --accent: #C4A35A;
            --accent-deep: #8B6914;
            --accent-glow: rgba(196, 163, 90, 0.3);
            --border: #E0D8C8;
            --shadow-soft: rgba(44, 36, 22, 0.08);
            --shadow-medium: rgba(44, 36, 22, 0.15);
            --code-bg: #F8F4EC;
            --blockquote-border: #C4A35A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.8;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: linear-gradient(to bottom, var(--bg-secondary), rgba(245, 240, 232, 0.95));
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1000;
            box-shadow: 0 2px 20px var(--shadow-soft);
            -webkit-app-region: drag;
        }

        .header button, .header .logo {
            -webkit-app-region: no-drag;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text-primary);
        }

        .logo span {
            color: var(--accent);
        }

        .open-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--accent) 0%, #D4B36A 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-family: 'Crimson Pro', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .open-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .open-btn svg {
            width: 18px;
            height: 18px;
        }

        .main-container {
            display: flex;
            margin-top: 70px;
            min-height: calc(100vh - 70px);
        }

        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 40px 24px;
            position: fixed;
            left: 0;
            top: 70px;
            bottom: 0;
            overflow-y: auto;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .sidebar-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .toc-list {
            list-style: none;
        }

        .toc-item {
            margin: 8px 0;
        }

        .toc-link {
            display: block;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            border-left: 2px solid transparent;
            cursor: pointer;
        }

        .toc-link:hover {
            background: var(--bg-paper);
            color: var(--text-primary);
            border-left-color: var(--accent);
        }

        .toc-link.h2 {
            padding-left: 24px;
            font-size: 0.9rem;
        }

        .toc-link.h3 {
            padding-left: 36px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .content-wrapper {
            flex: 1;
            margin-left: 280px;
            display: flex;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .content-wrapper.visible {
            opacity: 1;
        }

        .content {
            max-width: 780px;
            width: 100%;
            padding: 60px 80px 100px;
            background: var(--bg-paper);
            min-height: calc(100vh - 70px);
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.02),
                0 20px 60px var(--shadow-soft),
                0 5px 20px var(--shadow-soft);
        }

        .markdown-body {
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .markdown-body h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 0.8em 0;
            line-height: 1.2;
            letter-spacing: -0.02em;
            position: relative;
            padding-bottom: 0.4em;
        }

        .markdown-body h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(to right, var(--accent), transparent);
            border-radius: 2px;
        }

        .markdown-body h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 2em 0 0.8em 0;
            line-height: 1.3;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.4em;
        }

        .markdown-body h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 1.8em 0 0.6em 0;
            line-height: 1.4;
        }

        .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin: 1.5em 0 0.5em 0;
        }

        .markdown-body p {
            margin: 0 0 1.3em 0;
            text-align: justify;
            hyphens: auto;
        }

        .markdown-body a {
            color: var(--accent-deep);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .markdown-body a:hover {
            border-bottom-color: var(--accent);
        }

        .markdown-body strong {
            font-weight: 700;
            color: var(--text-primary);
        }

        .markdown-body em {
            font-style: italic;
        }

        .markdown-body blockquote {
            margin: 1.5em 0;
            padding: 1em 1.5em;
            border-left: 4px solid var(--blockquote-border);
            background: linear-gradient(to right, rgba(196, 163, 90, 0.08), transparent);
            font-style: italic;
            color: var(--text-secondary);
        }

        .markdown-body blockquote p:last-child {
            margin-bottom: 0;
        }

        .markdown-body ul, .markdown-body ol {
            margin: 0 0 1.3em 0;
            padding-left: 1.8em;
        }

        .markdown-body li {
            margin: 0.5em 0;
        }

        .markdown-body li::marker {
            color: var(--accent);
            font-weight: bold;
        }

        .markdown-body code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.88em;
            background: var(--code-bg);
            padding: 0.2em 0.5em;
            border-radius: 4px;
            color: var(--accent-deep);
        }

        .markdown-body pre {
            background: #2C2416;
            color: #FAF7F2;
            padding: 1.5em;
            border-radius: 12px;
            overflow-x: auto;
            margin: 1.5em 0;
            box-shadow:
                0 10px 40px rgba(44, 36, 22, 0.2),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .markdown-body pre code {
            background: none;
            padding: 0;
            color: inherit;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
            font-size: 0.95rem;
        }

        .markdown-body th, .markdown-body td {
            padding: 12px 16px;
            border: 1px solid var(--border);
            text-align: left;
        }

        .markdown-body th {
            background: var(--bg-secondary);
            font-weight: 600;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
        }

        .markdown-body tr:nth-child(even) {
            background: rgba(245, 240, 232, 0.5);
        }

        .markdown-body hr {
            border: none;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--border), transparent);
            margin: 2.5em 0;
        }

        .markdown-body img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5em 0;
            box-shadow: 0 10px 30px var(--shadow-medium);
        }

        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 70px);
            padding: 60px;
            text-align: center;
        }

        .welcome-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent), #D4B36A);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            box-shadow: 0 20px 60px var(--accent-glow);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .welcome-icon svg {
            width: 60px;
            height: 60px;
            color: white;
        }

        .welcome h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .welcome p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            max-width: 400px;
        }

        .welcome-features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 60px;
        }

        .feature-item {
            text-align: center;
            padding: 30px;
            background: var(--bg-paper);
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--shadow-soft);
        }

        .feature-icon {
            width: 50px;
            height: 50px;
            background: var(--bg-secondary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .feature-icon svg {
            width: 24px;
            height: 24px;
            color: var(--accent);
        }

        .feature-item h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .feature-item p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 0;
        }

        .file-info {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-paper);
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 10px 40px var(--shadow-medium);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .file-info.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .file-info svg {
            width: 18px;
            height: 18px;
            color: var(--accent);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        @media (max-width: 1200px) {
            .content {
                padding: 50px 60px 80px;
            }
        }

        @media (max-width: 900px) {
            .sidebar {
                display: none;
            }
            .content-wrapper {
                margin-left: 0;
            }
            .welcome-features {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 0 20px;
            }
            .content {
                padding: 30px 25px 60px;
            }
            .markdown-body h1 {
                font-size: 2rem;
            }
            .markdown-body h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">Parch<span>ment</span></div>
        <button class="open-btn" id="openBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="12" y1="18" x2="12" y2="12"></line>
                <line x1="9" y1="15" x2="15" y2="15"></line>
            </svg>
            打开文件
        </button>
    </header>

    <div class="main-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">目录导航</div>
            <nav class="toc-list" id="toc"></nav>
        </aside>

        <div class="content-wrapper" id="contentWrapper">
            <article class="content" id="content">
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                    </div>
                    <h2>欢迎使用 Parchment</h2>
                    <p>一个优雅的 Markdown 阅读器，为您带来沉浸式的文档阅读体验</p>

                    <div class="welcome-features">
                        <div class="feature-item">
                            <div class="feature-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                </svg>
                            </div>
                            <h3>打开文件</h3>
                            <p>支持 .md 和 .markdown 格式</p>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polygon points="10 8 16 12 10 16 10 8"></polygon>
                                </svg>
                            </div>
                            <h3>优雅渲染</h3>
                            <p>精美的排版与视觉体验</p>
                        </div>
                        <div class="feature-item">
                            <div class="feature-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="3" y1="12" x2="21" y2="12"></line>
                                    <line x1="3" y1="6" x2="21" y2="6"></line>
                                    <line x1="3" y1="18" x2="21" y2="18"></line>
                                </svg>
                            </div>
                            <h3>目录导航</h3>
                            <p>快速跳转到任意章节</p>
                        </div>
                    </div>
                </div>
                <div class="markdown-body" id="markdownBody" style="display: none;"></div>
            </article>
        </div>
    </div>

    <div class="file-info" id="fileInfo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
        </svg>
        <span id="fileName"></span>
    </div>

    <script>
        // 配置 marked 选项
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: true
        });

        // DOM 元素
        const openBtn = document.getElementById('openBtn');
        const welcome = document.getElementById('welcome');
        const markdownBody = document.getElementById('markdownBody');
        const contentWrapper = document.getElementById('contentWrapper');
        const sidebar = document.getElementById('sidebar');
        const fileInfo = document.getElementById('fileInfo');
        const fileNameEl = document.getElementById('fileName');
        const toc = document.getElementById('toc');

        // 打开文件按钮
        openBtn.addEventListener('click', async () => {
            const result = await window.electronAPI.openFileDialog();
            if (result) {
                renderMarkdown(result.content, result.filename);
            }
        });

        // 监听通过"打开方式"打开的文件
        window.electronAPI.onFileOpened((data) => {
            renderMarkdown(data.content, data.filename);
        });

        // 渲染 Markdown
        function renderMarkdown(content, filename) {
            welcome.style.display = 'none';
            markdownBody.style.display = 'block';

            markdownBody.innerHTML = marked.parse(content);

            setTimeout(() => {
                contentWrapper.classList.add('visible');
                sidebar.classList.add('visible');
            }, 100);

            generateTOC(markdownBody);

            fileNameEl.textContent = filename;
            fileInfo.classList.add('visible');

            markdownBody.style.animation = 'none';
            setTimeout(() => {
                markdownBody.style.animation = 'fadeInUp 0.8s ease';
            }, 10);
        }

        // 生成目录
        function generateTOC(container) {
            const headings = container.querySelectorAll('h1, h2, h3');
            toc.innerHTML = '';

            headings.forEach((heading, index) => {
                const id = `heading-${index}`;
                heading.id = id;

                const li = document.createElement('li');
                li.className = 'toc-item';

                const a = document.createElement('a');
                a.className = `toc-link ${heading.tagName.toLowerCase()}`;
                a.textContent = heading.textContent;

                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });

                li.appendChild(a);
                toc.appendChild(li);
            });
        }

        // 快捷键支持
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
                e.preventDefault();
                openBtn.click();
            }
        });
    </script>
</body>
</html>
